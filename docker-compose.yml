services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: pearl
      POSTGRES_USER: pearl
      POSTGRES_PASSWORD: pearl_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8001:8001"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://pearl:pearl_dev@db:5432/pearl
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

volumes:
  postgres_data:
