{% extends "base.html" %}
{% block title %}Приход — Склад{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Приход продукта</h1>
  <a href="/warehouse/?org_id={{ current_org_id }}" class="btn btn-secondary">← Назад</a>
</div>

<div class="card" style="max-width:520px">
  {% if error %}
  <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/warehouse/receipt/add">
    <input type="hidden" name="org_id" value="{{ current_org_id }}">

    <div class="form-group">
      <label>Дата</label>
      <input type="date" name="receipt_date" class="form-control" value="{{ today }}" required>
    </div>

    <div class="form-group">
      <label>Продукт</label>
      <select name="product_id" id="product_select" class="form-control" onchange="onProductChange(this)" required>
        <option value="">— выберите продукт —</option>
        <option value="new">＋ Новый продукт</option>
        {% for p in products %}
        <option value="{{ p.id }}" data-unit="{{ p.unit or 'кг' }}">{{ p.name }} ({{ p.unit or 'кг' }})</option>
        {% endfor %}
      </select>
    </div>

    <div id="new_product_block" style="display:none;background:var(--bg);border-radius:8px;padding:16px;margin-bottom:18px">
      <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:12px;text-transform:uppercase">Новый продукт</div>
      <div class="form-group" style="margin-bottom:12px">
        <label>Название</label>
        <input type="text" name="new_product_name" class="form-control" placeholder="напр. Мука пшеничная">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group" style="margin:0">
          <label>Единица</label>
          <select name="new_product_unit" class="form-control">
            {% for u in units %}
            <option value="{{ u }}" {% if u == 'кг' %}selected{% endif %}>{{ u }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group" style="margin:0">
          <label>Категория</label>
          <select name="new_product_category" class="form-control">
            {% for c in categories %}
            <option value="{{ c }}">{{ c }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="form-group">
        <label>Количество (<span id="unit_label">кг</span>)</label>
        <input type="number" name="quantity" class="form-control" step="0.001" min="0.001"
               placeholder="0.000" oninput="calcTotal()" required>
      </div>
      <div class="form-group">
        <label>Цена за <span id="unit_label2">кг</span> (сом)</label>
        <input type="number" name="price_per_unit" class="form-control" step="0.01" min="0"
               placeholder="0.00" oninput="calcTotal()" required>
      </div>
    </div>

    <div class="form-group">
      <label>Итого (сом)</label>
      <input type="text" id="total_display" class="form-control" readonly
             style="background:var(--bg);font-weight:700;font-size:16px" placeholder="—">
    </div>

    <div class="form-group">
      <label>Поставщик (необязательно)</label>
      <input type="text" name="supplier_name" class="form-control" placeholder="напр. Ранок базар">
    </div>

    <div style="display:flex;gap:10px;margin-top:8px">
      <button type="submit" class="btn btn-primary">Сохранить приход</button>
      <a href="/warehouse/?org_id={{ current_org_id }}" class="btn btn-secondary">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
function onProductChange(sel) {
  const block = document.getElementById('new_product_block');
  block.style.display = sel.value === 'new' ? 'block' : 'none';
  const unit = sel.options[sel.selectedIndex]?.dataset.unit || 'кг';
  document.getElementById('unit_label').textContent = unit;
  document.getElementById('unit_label2').textContent = unit;
}

function calcTotal() {
  const qty = parseFloat(document.querySelector('[name=quantity]').value) || 0;
  const price = parseFloat(document.querySelector('[name=price_per_unit]').value) || 0;
  const total = qty * price;
  document.getElementById('total_display').value = total > 0
    ? total.toLocaleString('ru-RU', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' с'
    : '';
}
</script>
{% endblock %}
