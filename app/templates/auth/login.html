<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — Жемчужина</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f6fa; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: #fff; border-radius: 16px; padding: 40px;
    width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .logo { font-size: 28px; margin-bottom: 8px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 32px; }
  .user-btn {
    display: flex; align-items: center; gap: 14px;
    width: 100%; padding: 14px 16px; margin-bottom: 10px;
    background: #f5f6fa; border: 2px solid #e2e5ec;
    border-radius: 12px; cursor: pointer; text-align: left;
    font-size: 15px; font-weight: 500; transition: all 0.15s;
  }
  .user-btn:hover { border-color: #4f7ef8; background: #eef2ff; }
  .user-btn .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: #4f7ef8; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; flex-shrink: 0;
  }
  .user-btn .info { flex: 1; }
  .user-btn .role { font-size: 12px; color: #6b7280; font-weight: 400; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🏫</div>
  <h1>Жемчужина</h1>
  <p class="subtitle">Выберите кто вы</p>

  {% set role_labels = {
    "owner": "Владелец",
    "director": "Директор",
    "manager": "Управляющий",
    "teacher": "Педагог"
  } %}

  {% for user in users %}
  <form method="post" action="/login">
    <input type="hidden" name="user_id" value="{{ user.id }}">
    <button type="submit" class="user-btn">
      <div class="avatar">{{ user.name[0] }}</div>
      <div class="info">
        <div>{{ user.name }}</div>
        <div class="role">{{ role_labels.get(user.role, user.role) }}</div>
      </div>
    </button>
  </form>
  {% endfor %}
</div>
</body>
</html>
