<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Жемчужина{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --border: #e2e5ec;
    --primary: #4f7ef8;
    --primary-dark: #3563e9;
    --text: #1a1d23;
    --text-muted: #6b7280;
    --danger: #ef4444;
    --success: #22c55e;
    --sidebar-w: 200px;

    /* Типографическая шкала */
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --text-xs:    11px;
    --text-sm:    13px;
    --text-base:  15px;
    --text-input: 16px;
    --text-title: 17px;
    --text-h1:    22px;
    --fw-normal:  400;
    --fw-medium:  500;
    --fw-semi:    600;
    --fw-bold:    700;
  }

  body {
    font-family: var(--font);
    font-size: var(--text-base);
    line-height: 1.5;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* TOPBAR */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 56px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 16px; z-index: 100;
  }
  .topbar .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; flex-shrink: 0; }
  .topbar .logo img { height: 36px; width: 36px; border-radius: 50%; object-fit: cover; }
  .topbar .logo span { font-weight: var(--fw-bold); font-size: var(--text-input); color: var(--text); white-space: nowrap; }
  .topbar .org-select {
    margin-left: auto; padding: 6px 12px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--bg); font-size: var(--text-sm); font-family: var(--font); cursor: pointer;
  }
  .topbar .user { font-size: var(--text-sm); color: var(--text-muted); }

  /* SIDEBAR */
  .sidebar {
    position: fixed; top: 56px; left: 0; bottom: 0; width: var(--sidebar-w);
    background: var(--surface); border-right: 1px solid var(--border);
    padding: 16px 0; overflow-y: auto;
  }
  .sidebar a {
    display: block; padding: 10px 20px; color: var(--text-muted);
    text-decoration: none; font-size: var(--text-base); border-left: 3px solid transparent;
    transition: all 0.15s;
  }
  .sidebar a:hover { background: var(--bg); color: var(--text); }
  .sidebar a.active { color: var(--primary); border-left-color: var(--primary);
                      background: #eef2ff; font-weight: var(--fw-medium); }
  .sidebar .section { padding: 16px 20px 4px; font-size: var(--text-xs); font-weight: var(--fw-semi);
                      text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em; }

  /* MAIN */
  .main { margin-left: var(--sidebar-w); margin-top: 56px; padding: 28px; min-height: calc(100vh - 56px); }

  /* CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
  .card + .card { margin-top: 16px; }

  /* PAGE HEADER */
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .page-header h1 { font-size: var(--text-h1); font-weight: var(--fw-bold); }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px;
         border-radius: 8px; font-size: var(--text-base); font-weight: var(--fw-medium);
         font-family: var(--font); cursor: pointer;
         border: none; text-decoration: none; transition: all 0.15s; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-lg { padding: 14px 28px; font-size: var(--text-input); }

  /* FORM */
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: var(--text-sm); font-weight: var(--fw-medium);
                      color: var(--text-muted); margin-bottom: 6px; }
  .form-control { width: 100%; padding: 10px 14px; border: 1px solid var(--border);
                  border-radius: 8px; font-size: var(--text-base); font-family: var(--font);
                  background: var(--surface); color: var(--text); transition: border 0.15s; }
  .form-control:focus { outline: none; border-color: var(--primary); }
  select.form-control { cursor: pointer; }

  /* TABLE */
  .table { width: 100%; border-collapse: collapse; font-size: var(--text-base); }
  .table th { padding: 10px 14px; text-align: left; font-weight: var(--fw-semi); font-size: var(--text-xs);
              text-transform: uppercase; color: var(--text-muted); border-bottom: 2px solid var(--border);
              letter-spacing: 0.05em; }
  .table td { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .table tr:last-child td { border-bottom: none; }
  .table tr:hover td { background: var(--bg); }

  /* BADGES */
  .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: var(--text-sm); font-weight: var(--fw-medium); }
  .badge-pending  { background: #fef3c7; color: #92400e; }
  .badge-confirmed { background: #dcfce7; color: #166534; }
  .badge-rejected  { background: #fee2e2; color: #991b1b; }
  .badge-processing { background: #e0f2fe; color: #075985; }

  /* FILTERS */
  .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .filters select, .filters input { padding: 8px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: var(--text-sm); font-family: var(--font); background: var(--surface); }

  /* UPLOAD ZONE */
  .upload-zone {
    border: 2px dashed var(--border); border-radius: 12px; padding: 40px 20px;
    text-align: center; cursor: pointer; transition: all 0.2s; background: var(--bg);
  }
  .upload-zone:hover { border-color: var(--primary); background: #eef2ff; }
  .upload-zone input[type="file"] { display: none; }
  .upload-zone .upload-icon { font-size: 40px; margin-bottom: 12px; }
  .upload-zone .upload-text { font-size: 15px; color: var(--text-muted); }
  .upload-preview { margin-top: 16px; display: none; }
  .upload-preview img { max-width: 200px; border-radius: 8px; border: 1px solid var(--border); }

  /* PROGRESS */
  .progress { height: 6px; background: var(--border); border-radius: 3px; margin-top: 12px; display: none; }
  .progress-bar { height: 100%; background: var(--primary); border-radius: 3px;
                  width: 0; transition: width 0.3s; }

  /* TOTALS */
  .totals { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 16px;
            padding-top: 16px; border-top: 1px solid var(--border); }
  .total-item { font-size: 14px; }
  .total-item strong { font-size: 16px; }

  /* SPLIT */
  .split-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  /* BOTTOM NAV (mobile) */
  .bottom-nav {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    z-index: 200; padding-bottom: env(safe-area-inset-bottom);
  }
  .bottom-nav ul { display: flex; list-style: none; margin: 0; padding: 0; }
  .bottom-nav li { flex: 1; }
  .bottom-nav a {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 8px 4px 6px; text-decoration: none; font-size: 10px;
    color: var(--text-muted); gap: 3px; min-height: 52px;
  }
  .bottom-nav a.active { color: var(--primary); }
  .bottom-nav a span.nav-icon { font-size: 20px; line-height: 1; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .bottom-nav { display: block; }
    .topbar .user { display: none; }

    /* Компактные отступы */
    .main { margin-left: 0; padding: 12px; padding-bottom: 72px; }
    .card { padding: 16px; border-radius: 8px; }
    .form-group { margin-bottom: 14px; }

    /* Touch targets — минимум 44px, font-size 16px чтобы iOS не зумировал */
    .form-control,
    select.form-control {
      min-height: 44px;
      padding: 12px 14px;
      font-size: 16px;
    }
    .btn { min-height: 44px; font-size: 16px; }

    .split-row { grid-template-columns: 1fr; }
    .upload-zone { padding: 30px 16px; }
    .btn-camera { width: 100%; justify-content: center; padding: 18px; font-size: 16px; }
    .filters { flex-direction: column; }
  }

  /* RESPONSIVE TABLES */
  @media (max-width: 768px) {
    .table:not(#items-table) { display: block; border: none; }
    .table:not(#items-table) thead { display: none; }
    .table:not(#items-table) tbody { display: block; }
    .table:not(#items-table) tr {
      display: flex; flex-direction: column;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px; margin-bottom: 10px;
    }
    .table:not(#items-table) td {
      display: flex; justify-content: space-between; align-items: center;
      border: none; padding: 5px 0; gap: 12px;
    }
    .table:not(#items-table) td::before {
      content: attr(data-label);
      font-weight: 600; font-size: 12px; color: var(--text-muted);
      min-width: 90px; flex-shrink: 0;
    }
    .table:not(#items-table) td.actions {
      flex-direction: row; justify-content: flex-end; gap: 8px;
      padding-top: 8px; margin-top: 4px; border-top: 1px solid var(--border);
    }
    .table:not(#items-table) td.actions::before { display: none; }
    .table:not(#items-table) td[colspan] { display: none; }
  }

  .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
  .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
  .alert-success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
</style>
</head>
<body>

<nav class="topbar">
  <a href="/" class="logo">
    <img src="/static/logo.png" alt="Жемчужина">
  </a>
  <form method="get" action="{{ request.url.path }}" style="margin:0">
    <select name="org_id" class="org-select" onchange="this.form.submit()">
      {% for org in accessible_orgs %}
      <option value="{{ org.id }}" {% if org.id == current_org_id %}selected{% endif %}>{{ org.name }}</option>
      {% endfor %}
    </select>
  </form>
  <span class="user">{{ current_user.name }}</span>
  <form method="post" action="/logout" style="margin:0">
    <button type="submit"
            style="background:none;border:none;cursor:pointer;font-size:13px;color:#6b7280;padding:4px 8px;border-radius:6px"
            onmouseover="this.style.background='#f5f6fa'"
            onmouseout="this.style.background='none'">
      Выйти
    </button>
  </form>
</nav>

<aside class="sidebar">
  <div class="section">Финансы</div>
  <a href="/expenses/" class="{% if active_page == 'expenses' %}active{% endif %}">Закуп</a>
  <a href="/income/" class="{% if active_page == 'income' %}active{% endif %}">Приход</a>
  <div class="section">Учёт</div>
  <a href="/students/" class="{% if active_page == 'students' %}active{% endif %}">Ученики</a>
  <a href="/warehouse/" class="{% if active_page == 'warehouse' %}active{% endif %}">Склад</a>
  <div class="section">Аналитика</div>
  <a href="/reports/" class="{% if active_page == 'reports' %}active{% endif %}">Отчёты</a>
</aside>

<main class="main">
  {% block content %}{% endblock %}
</main>

<nav class="bottom-nav">
  <ul>
    <li><a href="/expenses/" class="{% if active_page == 'expenses' %}active{% endif %}">
      <span class="nav-icon">💸</span>Закуп
    </a></li>
    <li><a href="/income/" class="{% if active_page == 'income' %}active{% endif %}">
      <span class="nav-icon">💰</span>Приход
    </a></li>
    <li><a href="/students/" class="{% if active_page == 'students' %}active{% endif %}">
      <span class="nav-icon">👦</span>Ученики
    </a></li>
    <li><a href="/warehouse/" class="{% if active_page == 'warehouse' %}active{% endif %}">
      <span class="nav-icon">📦</span>Склад
    </a></li>
    <li><a href="/reports/" class="{% if active_page == 'reports' %}active{% endif %}">
      <span class="nav-icon">📊</span>Отчёты
    </a></li>
  </ul>
</nav>

<script>
// Org switcher preserves other query params
document.querySelector('.org-select')?.addEventListener('change', function() {
  const url = new URL(window.location);
  url.searchParams.set('org_id', this.value);
  window.location = url.toString();
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
