{% extends "base.html" %}
{% block title %}Изменить ребёнка — Жемчужина{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Изменить ребёнка</h1>
  <a href="/students/?org_id={{ current_org_id }}" class="btn btn-secondary">← Назад</a>
</div>

<div class="card" style="max-width:480px">
  {% if error %}
  <div class="alert alert-error" style="margin-bottom:18px">{{ error }}</div>
  {% endif %}

  <form method="post" action="/students/{{ student.id }}/edit">
    <div class="form-group">
      <label>PIN</label>
      <div style="padding:10px 14px;background:var(--bg);border:1px solid var(--border);
                  border-radius:8px;font-family:monospace;font-size:18px;
                  font-weight:700;color:var(--primary);letter-spacing:2px">
        {{ student.pin }}
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:4px">
        PIN не меняется — закреплён за ребёнком навсегда
      </div>
    </div>

    <div class="form-group">
      <label for="name">ФИО ребёнка *</label>
      <input type="text" id="name" name="name" class="form-control"
             value="{{ student.name }}" autofocus required>
    </div>

    <div class="form-group">
      <label for="group_id">Группа</label>
      <select id="group_id" name="group_id" class="form-control">
        <option value="">— без группы —</option>
        {% for g in groups %}
        <option value="{{ g.id }}" {% if g.id == current_group_id %}selected{% endif %}>
          {{ g.name }}
        </option>
        {% endfor %}
      </select>
    </div>

    <button type="submit" class="btn btn-primary btn-lg" style="width:100%">
      Сохранить
    </button>
  </form>
</div>
{% endblock %}
