{% extends "base.html" %}
{% block title %}Добавить сотрудника — Жемчужина{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Добавить сотрудника</h1>
</div>

{% if saved %}
<div class="alert alert-success">Сотрудник добавлен</div>
{% endif %}

<div class="card" style="max-width:480px">
  <form method="post" action="/employees/add" style="display:flex;flex-direction:column;gap:14px">
    <input type="hidden" name="org_id" value="{{ current_org_id or '' }}">
    <div class="form-group" style="margin-bottom:0">
      <label>ФИО *</label>
      <input type="text" name="full_name" class="form-control" required placeholder="Фамилия Имя" autofocus>
    </div>
    <div class="form-group" style="margin-bottom:0">
      <label>Должность</label>
      <input type="text" name="role" class="form-control" placeholder="напр. Воспитатель, Повар">
    </div>
    <button type="submit" class="btn btn-primary" style="align-self:flex-start">+ Добавить</button>
  </form>
</div>
{% endblock %}
